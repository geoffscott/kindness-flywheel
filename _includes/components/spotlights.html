<div class="container py-4">
  {% for spotlight in page.spotlights %}
  <div class="gs-spotlight">
    <div class="row align-items-center {% if spotlight.align == 'left' %}flex-row-reverse{% endif %}">
      <div class="col-md-6">
        {% if spotlight.image %}
        <img src="{{ spotlight.image | relative_url }}" alt="{{ spotlight.title }}" class="gs-spotlight__image">
        {% endif %}
      </div>
      <div class="col-md-6">
        <h3 class="gs-spotlight__title">{{ spotlight.title }}</h3>
        <div class="gs-spotlight__text">{{ spotlight.text | markdownify }}</div>
      </div>
    </div>
  </div>
  {% unless forloop.last %}<hr class="my-4">{% endunless %}
  {% endfor %}
</div>
